<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Obtenir plus d'avis Google">
  <defs>
    <pattern id="dg2" width="56" height="56" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse">
      <rect width="56" height="56" fill="#1B2A4A"/>
      <rect width="56" height="4" fill="#12203B"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dg2)"/>
  <text x="70" y="120" font-family="Archivo Black, Arial Black, sans-serif" font-size="26" fill="#F5B301" letter-spacing="4">ARTISAN 5 ÉTOILES · LE BLOG</text>
  <text x="70" y="235" font-family="Archivo Black, Arial Black, sans-serif" font-size="70" fill="#FFFFFF">Obtenez 3× plus</text>
  <text x="70" y="320" font-family="Archivo Black, Arial Black, sans-serif" font-size="70" fill="#F5B301">d'avis Google.</text>
  <!-- étoiles qui montent -->
  <g transform="translate(70,400)">
    <text x="0"   y="120" font-family="Arial" font-size="60" fill="#3a4a6b">★</text>
    <text x="90"  y="95"  font-family="Arial" font-size="70" fill="#5a6a8b">★</text>
    <text x="190" y="70"  font-family="Arial" font-size="80" fill="#F5B301">★</text>
    <text x="300" y="45"  font-family="Arial" font-size="90" fill="#F5B301">★</text>
    <text x="420" y="20"  font-family="Arial" font-size="100" fill="#F5B301">★</text>
  </g>
  <!-- téléphone SMS -->
  <g transform="translate(760,360)">
    <rect x="0" y="0" width="200" height="240" rx="24" fill="#FFFFFF" stroke="#F5B301" stroke-width="6"/>
    <rect x="20" y="40" width="130" height="42" rx="8" fill="#E7ECF4"/>
    <rect x="50" y="100" width="130" height="42" rx="8" fill="#1B2A4A"/>
    <text x="115" y="128" text-anchor="middle" font-family="Archivo, Arial" font-size="15" fill="#FFFFFF">Merci ! ⭐</text>
    <rect x="20" y="160" width="110" height="42" rx="8" fill="#E7ECF4"/>
  </g>
</svg>
